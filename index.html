<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Para Tatiana 💖</title>

<style>
body{
    margin:0;
    padding:0;
    background:linear-gradient(to bottom,#ff80bf,#ffd6ec);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family: Arial, sans-serif;
    overflow:hidden;
}

/* Tarjeta */
.card{
    background:white;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
    position:relative;
    z-index:10;
}

h1{ color:#ff007f; }
h2{ color:#ff3399; }

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    margin:10px;
    transition:0.3s;
}

#si{
    background:#ff007f;
    color:white;
}

#no{
    background:gray;
    color:white;
    position:absolute;
}

/* Corazones */
.heart{
    position:absolute;
    font-size:25px;
    animation:fall linear infinite;
}

@keyframes fall{
    0%{ transform:translateY(-10vh); opacity:1; }
    100%{ transform:translateY(110vh); opacity:0; }
}
</style>
</head>

<body>

<div class="card">
    <h1>Hola Tatiana 💕</h1>
    <h2>¿Quieres seguir siendo mi novia? 💖</h2>
    <button id="si" onclick="aceptar()">Sí 💘</button>
    <button id="no" onmouseover="escapar()">No 😢</button>
</div>

<audio autoplay loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<script>
let tamaño = 1;

function aceptar(){
    document.body.innerHTML = `
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;
    background:linear-gradient(to bottom,#ff80bf,#ffd6ec);
    font-family:Arial;text-align:center;">
        <div>
            <h1 style="color:#ff007f;font-size:50px;">Sabía que dirías que sí 😍💖</h1>
            <h2 style="color:#ff3399;">Te amo Tatiana 🌹✨</h2>
        </div>
    </div>
    `;
}

function escapar(){
    let no = document.getElementById("no");
    let si = document.getElementById("si");

    // Mover el NO
    no.style.top = Math.random()*600 + "px";
    no.style.left = Math.random()*600 + "px";

    // Hacer crecer el SI
    tamaño += 0.2;
    si.style.transform = "scale("+tamaño+")";

    // Si ya está muy grande, esconder el NO
    if(tamaño > 3){
        no.style.display = "none";
    }
}

/* MUCHOS corazones */
function crearCorazones(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.animationDuration = (Math.random()*2+2)+"s";
    heart.style.fontSize = (Math.random()*20+20)+"px";
    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },4000);
}

setInterval(crearCorazones,50000);
</script>

</body>
</html>
